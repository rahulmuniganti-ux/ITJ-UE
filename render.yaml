
services:
  - type: web
    name: itj-ue-portal
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && python create_db.py"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_PATH
        value: /opt/render/project/src/database.db
      - key: UPLOAD_FOLDER
        value: /tmp/uploads
